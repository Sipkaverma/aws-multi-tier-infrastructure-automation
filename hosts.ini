[bastion]
bastion_host ansible_host=$(terraform output -raw bastion_public_ip) ansible_user=ec2-user ansible_ssh_private_key_file=./prod-ssh-key

[app]
app_server ansible_host=$(terraform output -raw app_private_ip) ansible_user=ec2-user ansible_ssh_private_key_file=./prod-ssh-key

[app:vars]
ansible_ssh_common_args='-o ProxyCommand="ssh -W %h:%p -i ./prod-ssh-key -o StrictHostKeyChecking=no ec2-user@$(terraform output -raw bastion_public_ip)"'
